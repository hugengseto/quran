services:
  # PHP Application Server || Pastikan nama container unik di sistem Anda
  app:
    build:
      context: .
      dockerfile: docker/php.dockerfile
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}" # Biar file milik user Fedora Anda
    volumes:
      - ./:/var/www/html:Z # :Z untuk izin SELinux di Fedora
    networks:
      - laravel-net

  # Web Server (Nginx)
  nginx:
    image: nginx:alpine
    ports:
      - "${FORWARD_NGINX_PORT:-8000}:80" # Akses di browser via localhost:8000
    volumes:
      - ./:/var/www/html:Z
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:Z
    depends_on:
      - app
    networks:
      - laravel-net

  # Database (MySQL) || Pastikan nama container unik di sistem Anda
  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password # Menghindari error koneksi di PHP lama/tertentu
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: laravel_user
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql:Z
    networks:
      - laravel-net
    healthcheck: # Memastikan DB benar-benar siap sebelum Laravel mencoba koneksi
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD}"]
      retries: 3
      timeout: 5s

  # Database Management (phpMyAdmin)
  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=${DB_PASSWORD:-root} # Jika DB_PASSWORD kosong di .env, gunakan 'root'
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-root}
    ports:
      - "${FORWARD_PHPMYADMIN_PORT:-8081}:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - laravel-net

  # Frontend (Vite & Tailwind)
  node:
    image: node:20-alpine
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:Z
    ports:
      - "${FORWARD_VITE_PORT:-5173}:5173" # Port Hot Reload Vite
    command: npm run dev
    networks:
      - laravel-net

# Jaringan Docker untuk komunikasi antar container || Pastikan nama jaringan unik di sistem Anda (jika menjalankan 2 proyek sekaligus, gunakan nama jaringan berbeda)
networks:
  laravel-net:
    driver: bridge

volumes:
  db_data: # Data database tetap aman meski kontainer dihapus


#CATATAN UNTUK PRIBADI:
# - Pastikan untuk menyesuaikan DOCKER_USER_ID dan DOCKER_GROUP_ID di file .env sesuai dengan user dan group ID di sistem Fedora Anda agar tidak ada masalah izin file saat menggunakan volume.
# - Gunakan perintah `docker-compose up --build` untuk membangun ulang image jika ada perubahan pada Dockerfile atau konfigurasi.
# - Akses aplikasi Laravel di http://localhost:8000, phpMyAdmin di http://localhost:8081, dan pastikan Vite berjalan dengan hot reload di http://localhost:5173.

# KONFIGURASI DOCKER
# 1. Nama Container aplikasi: laravel-app pastikan tidak bentrok dengan container lain di sistem Anda.
# 2. Port Mapping: Pastikan port 8000 (Laravel), 8081 (phpMyAdmin), dan 5173 (Vite) tidak digunakan oleh aplikasi lain di host Anda.
# 3. Volume Mounting: Pastikan direktori proyek Anda memiliki izin yang benar untuk diakses oleh Docker, terutama jika menggunakan SELinux di Fedora (gunakan opsi :Z untuk mengatasi masalah izin).
# 4. Nama Container Database: laravel-db pastikan tidak bentrok dengan container database lain yang mungkin sudah berjalan di sistem Anda.
# 5. Nama Jaringan: laravel-net pastikan tidak bentrok dengan jaringan Docker lain yang sudah ada di sistem Anda. (Jika menjalankan 2 proyek sekaligus, pastikan nama jaringan berbeda untuk masing-masing proyek agar tidak terjadi konflik).
